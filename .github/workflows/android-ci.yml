      #   run: |
      #     # Mask passwords so they never appear in any log output
      #     echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
      #     echo "::add-mask::${{ secrets.ANDROID_KEY_PASSWORD }}"
      #
      #     KEYSTORE_PATH=$RUNNER_TEMP/release.jks
      #
      #     # Decode to RUNNER_TEMP (never to android/app/)
