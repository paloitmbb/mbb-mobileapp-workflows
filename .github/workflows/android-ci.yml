      #
      #     # Verify keystore is valid — catches corrupt base64 decode early
      #     keytool -list \
      #       -keystore "$KEYSTORE_PATH" \
      #       -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
      #       -noprompt
      #
      #     # Export path so downstream steps (build + cleanup) can reference it
      #     echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
      #     echo "✅ Keystore decoded and verified at $KEYSTORE_PATH"

      # -----------------------------------------------------------------------
      # Step 9: Install Android SDK components
      # -----------------------------------------------------------------------
      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-${{ env.ANDROID_PLATFORM_VERSION }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            --sdk_root=$ANDROID_SDK_ROOT

          echo "✅ Android SDK components installed"

      # -----------------------------------------------------------------------
      # Step 10: Verify NDK source.properties
      # -----------------------------------------------------------------------
      - name: Verify NDK source.properties
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          if [ ! -f "$NDK_PATH/source.properties" ]; then
            echo "❌ NDK source.properties not found at $NDK_PATH"
            exit 1
          fi
          cat "$NDK_PATH/source.properties"
          echo "✅ NDK verified"

      # -----------------------------------------------------------------------
      # Step 11: Make Gradle executable
      # -----------------------------------------------------------------------
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # -----------------------------------------------------------------------
      # Step 12: Build debug APK (temporary - switch to release once secrets are configured)
      # -----------------------------------------------------------------------
