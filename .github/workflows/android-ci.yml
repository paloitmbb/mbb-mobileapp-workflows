      #     if-no-files-found: error
      #     retention-days: 7

      # -----------------------------------------------------------------------
      # Step 18: Job summary
      # -----------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          echo "## 🤖 Android CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | RegionalApp (Android) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Node.js** | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **JDK** | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Cleanup: Remove keystore and firebase config
      # -----------------------------------------------------------------------
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/release.jks"
          rm -f "$RUNNER_TEMP/google-services.json"
          rm -f android/app/google-services.json  # removes symlink
          echo "✅ Cleanup complete"
