# =============================================================================
# MBB Mobile App - Android CI Workflow (React Native)
# =============================================================================
# This workflow builds the Android RegionalApp using React Native.
# It requires Node.js (for RN JS bundle) + JDK 17 + Gradle.
# Trigger: workflow_dispatch (manual) with environment selection.
#
# Job Flow:
#   Job 1: Install  →  Jobs 2a-2e: Lint, Test, Scan (parallel)  →  Job 3: Build Android
#
# Note: CodeQL runs independently via codeql.yml
#       Secret scanning is handled by GitHub's native secret scanning
# =============================================================================

name: Android CI - RegionalApp

on:
  # ---------------------------------------------------------------------------
  # Auto-trigger: On push to main (after PR merge) — triggers CD pipeline
  # ---------------------------------------------------------------------------
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'  # Include source code changes that may affect the build
      - 'package*.json'  # Include dependency changes that may affect the build

  # ---------------------------------------------------------------------------
  # Validation: On PR to main (CI checks only, does NOT trigger CD)
  # ---------------------------------------------------------------------------
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'  # Include source code changes that may affect the build
      - 'package*.json'  # Include dependency changes that may affect the build

  # ---------------------------------------------------------------------------
  # Manual trigger
  # ---------------------------------------------------------------------------
  workflow_dispatch:

permissions:
  contents: read          # Allows workflow to clone repository
  security-events: write  # Allows uploading Trivy SARIF results
  actions: read          # Allows using actions/checkout and other actions
  checks: write          # Allows updating commit status with build results
  pull-requests: write   # Allows commenting on PRs with build results

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  ANDROID_PLATFORM_VERSION: '34'
  NDK_VERSION: '25.2.9519653'

# ---------------------------------------------------------------------------
# Concurrency - cancel in-progress runs for the same branch/environment
# ---------------------------------------------------------------------------
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Install - Install dependencies and check app version
  # ===========================================================================
  install:
    name: Install dependencies & Check app version
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      APP_VERSION_NAME: ${{ steps.app_version.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ steps.app_version.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # -----------------------------------------------------------------------
      # Step 3: Install npm dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Step 4: Cache node_modules for downstream jobs
      # -----------------------------------------------------------------------
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 5: Check app version
      # -----------------------------------------------------------------------
      - name: Check app version
        id: app_version
        run: |
          # Extract versionName from build.gradle
          APP_VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle || echo "1.0.0")

          # Extract versionCode from build.gradle
          APP_VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle || echo "1")

          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "APP_VERSION_CODE=$APP_VERSION_CODE" >> $GITHUB_OUTPUT

          echo "📱 App Version: $APP_VERSION_NAME ($APP_VERSION_CODE)"

  # ============================================================
  # Job 2a: JS Lint (runs in parallel with 2b, 2c, 2d)
  # ============================================================
  lint-js:
    name: JS Lint (ESLint)
    runs-on: ubuntu-latest
    needs: install          # ← waits for install, then runs in parallel
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint

  # ============================================================
  # Job 2b: Android Lint (runs in parallel with 2a, 2c, 2d)
  # ============================================================
  lint-android:
    name: Android Lint (Gradle)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Run Gradle lint
        run: cd android && ./gradlew lint --parallel --build-cache

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-lint-report-${{ github.sha }}
          path: android/app/build/reports/lint-results*.html
          retention-days: 7


  # ============================================================
  # Job 2c: JS Unit Tests (runs in parallel with 2a, 2b, 2d)
  # ============================================================
  test-js:
    name: JS Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Jest tests
        run: npm test -- --ci --coverage
        # No continue-on-error — failure blocks the build


      - name: Upload Jest coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7
  # ============================================================
  # Job 2d: Android Unit Tests (runs in parallel with 2a, 2b, 2c)
  # ============================================================
  test-android:
    name: Android Unit Tests (Gradle)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Run Android unit tests
        run: cd android && ./gradlew test --parallel --build-cache

      - name: Upload Android test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results-${{ github.sha }}
          path: android/**/build/test-results/
          retention-days: 7

  # ============================================================
  # Job 2e: Security Scan (non-blocking — does NOT gate build)
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    continue-on-error: true    # ← non-blocking, won't stop build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: npm audit
        run: npm audit --audit-level=moderate || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: OWASP dependency check
        run: cd android && ./gradlew dependencyCheckAnalyze || true


  # ===========================================================================
  # Job 2: Build Android - Build, sign, and upload artifacts
  # ===========================================================================
  build:
    name: Build Android (Debug)
    runs-on: ubuntu-latest
    needs: [install, lint-js, lint-android, test-js, test-android]
    timeout-minutes: 60
    env:
      APP_VERSION_NAME: ${{ needs.install.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ needs.install.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # Step 3: Restore node_modules cache
      # -----------------------------------------------------------------------
      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4: Setup Java
      # -----------------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # -----------------------------------------------------------------------
      # Step 5: Cache Gradle dependencies
      # -----------------------------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # Step 6: Create local.properties
      # -----------------------------------------------------------------------
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "✅ local.properties created: sdk.dir=$ANDROID_SDK_ROOT"

      # -----------------------------------------------------------------------
      # Step 7: [COMMENTED - Uncomment when secrets are configured]
      # Create google-services.json from base64
      # -----------------------------------------------------------------------
