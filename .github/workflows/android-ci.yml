# =============================================================================
# MBB Mobile App - Android CI Workflow (React Native)
# =============================================================================
# This workflow builds the Android RegionalApp using React Native.
# It requires Node.js (for RN JS bundle) + JDK 17 + Gradle.
# Trigger: workflow_dispatch (manual) with environment selection.
#
# Job Flow:
#   Job 1: Quality Gate (Install + Scan + Test)  →  Job 2: Build Android
#
# Note: CodeQL runs independently via codeql.yml
#       Secret scanning is handled by GitHub's native secret scanning
# =============================================================================

name: Android CI - RegionalApp

on:
  # ---------------------------------------------------------------------------
  # Auto-trigger: On push to main (after PR merge) — triggers CD pipeline
  # ---------------------------------------------------------------------------
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-ci.yml'

  # ---------------------------------------------------------------------------
  # Validation: On PR to main (CI checks only, does NOT trigger CD)
  # ---------------------------------------------------------------------------
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-ci.yml'

  # ---------------------------------------------------------------------------
  # Manual trigger
  # ---------------------------------------------------------------------------
  workflow_dispatch:

permissions:
  contents: read          # Allows workflow to clone repository
  security-events: write  # Allows uploading Trivy SARIF results

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  ANDROID_PLATFORM_VERSION: '34'
  NDK_VERSION: '25.2.9519653'

# ---------------------------------------------------------------------------
# Concurrency - cancel in-progress runs for the same branch/environment
# ---------------------------------------------------------------------------
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Quality Gate - Install, Scan, Lint, and Test in a single job
  # ===========================================================================
  quality-gate:
    name: Quality Gate (Install + Scan + Test)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      APP_VERSION_NAME: ${{ steps.app_version.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ steps.app_version.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # -----------------------------------------------------------------------
      # Step 3: Install npm dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Step 4: Cache node_modules for downstream jobs
      # -----------------------------------------------------------------------
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 5: Check app version
      # -----------------------------------------------------------------------
      - name: Check app version
        id: app_version
        run: |
          # Extract versionName from build.gradle
          APP_VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle || echo "1.0.0")

          # Extract versionCode from build.gradle
          APP_VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle || echo "1")

          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "APP_VERSION_CODE=$APP_VERSION_CODE" >> $GITHUB_OUTPUT

          echo "📱 App Version: $APP_VERSION_NAME ($APP_VERSION_CODE)"

      # -----------------------------------------------------------------------
      # Step 6: Security scan (npm audit)
      # -----------------------------------------------------------------------
      - name: Security audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Step 7: Lint (ESLint)
      # -----------------------------------------------------------------------
      - name: ESLint
        run: npm run lint

      # -----------------------------------------------------------------------
      # Step 8: Setup Java
      # -----------------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # -----------------------------------------------------------------------
      # Step 9: Make Gradle executable
      # -----------------------------------------------------------------------
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # -----------------------------------------------------------------------
      # Step 10: Security scan (OWASP)
      # -----------------------------------------------------------------------
      - name: Security scan (OWASP)
        run: |
          cd android
          ./gradlew dependencyCheckAnalyze || true
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Step 11: Lint check (Gradle)
      # -----------------------------------------------------------------------
      - name: Gradle lint check
        run: |
          cd android
          ./gradlew lint

      # -----------------------------------------------------------------------
      # Step 12: Run JS unit tests
      # -----------------------------------------------------------------------
      - name: Run unit tests
        run: npm test

      # -----------------------------------------------------------------------
      # Step 13: Run Android unit tests (Gradle)
      # -----------------------------------------------------------------------
      - name: Run Android unit tests
        run: |
          cd android
          ./gradlew test

  # ===========================================================================
  # Job 2: Build Android - Build, sign, and upload artifacts
  # ===========================================================================
  build:
    name: Build Android (Release)
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 60
    env:
      APP_VERSION_NAME: ${{ needs.quality-gate.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ needs.quality-gate.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # Step 3: Restore node_modules cache
      # -----------------------------------------------------------------------
      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4: Setup Java
      # -----------------------------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # -----------------------------------------------------------------------
      # Step 5: Cache Gradle dependencies
      # -----------------------------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # Step 6: Create local.properties
      # -----------------------------------------------------------------------
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "✅ local.properties created: sdk.dir=$ANDROID_SDK_ROOT"

      # -----------------------------------------------------------------------
      # Step 7: Create google-services.json from base64
      # -----------------------------------------------------------------------
      - name: Create google-services.json from base64
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          echo "✅ google-services.json decoded successfully"

      # -----------------------------------------------------------------------
      # Step 8: Verify google-services.json exists
      # -----------------------------------------------------------------------
      - name: Verify google-services.json exists
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "❌ google-services.json not found!"
            exit 1
          fi
          echo "✅ google-services.json verified"

      # -----------------------------------------------------------------------
      # Step 9: Create Android keystore from base64
      # -----------------------------------------------------------------------
      - name: Create Android keystore from base64
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          echo "✅ Android keystore decoded successfully"

      # -----------------------------------------------------------------------
      # Step 10: Verify Android keystore exists
      # -----------------------------------------------------------------------
      - name: Verify Android keystore exists
        run: |
          if [ ! -f android/app/release.jks ]; then
            echo "❌ Android keystore not found!"
            exit 1
          fi
          echo "✅ Android keystore verified"

      # -----------------------------------------------------------------------
      # Step 11: Install Android SDK components
      # -----------------------------------------------------------------------
      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-${{ env.ANDROID_PLATFORM_VERSION }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            --sdk_root=$ANDROID_SDK_ROOT

          echo "✅ Android SDK components installed"

      # -----------------------------------------------------------------------
      # Step 12: Verify NDK source.properties
      # -----------------------------------------------------------------------
      - name: Verify NDK source.properties
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          if [ ! -f "$NDK_PATH/source.properties" ]; then
            echo "❌ NDK source.properties not found at $NDK_PATH"
            exit 1
          fi
          cat "$NDK_PATH/source.properties"
          echo "✅ NDK verified"

      # -----------------------------------------------------------------------
      # Step 13: Make Gradle executable
      # -----------------------------------------------------------------------
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # -----------------------------------------------------------------------
      # Step 14: Build release AAB
      # -----------------------------------------------------------------------
      - name: Build Android AAB (Release)
        run: |
          cd android
          ./gradlew bundleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=release.jks \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}

          echo "✅ AAB build complete"

      # -----------------------------------------------------------------------
      # Step 15: Trivy vulnerability scan
      # -----------------------------------------------------------------------
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-android'

      # -----------------------------------------------------------------------
      # Step 16: Upload AAB artifact
      # -----------------------------------------------------------------------
      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Step 16: Build release APK
      # -----------------------------------------------------------------------
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=release.jks \
            -PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
            -PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}

          echo "✅ APK build complete"

      # -----------------------------------------------------------------------
      # Step 17: Upload APK artifact
      # -----------------------------------------------------------------------
      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Step 18: Job summary
      # -----------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          echo "## 🤖 Android CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | RegionalApp (Android) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | Release |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Node.js** | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **JDK** | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Cleanup: Remove keystore and firebase config
      # -----------------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          rm -f android/app/release.jks
          rm -f android/app/google-services.json
