name: macOS CI - React JS

on:
  workflow_dispatch:

# Prevent duplicate workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Centralized configuration - change values here only
env:
  AUDIT_LEVEL: moderate
  APPROVED_LICENSES: 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD'
  RETENTION_DAYS: 7
  BUILD_PATH: build/
  COVERAGE_PATH: coverage/

jobs:
  build-and-test:
    name: Build & Test React App (Node ${{ matrix.node-version }})
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      # Step 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Node.js
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Security audit on dependencies
      - name: Run security audit
        run: npm audit --audit-level=${{ env.AUDIT_LEVEL }}
        continue-on-error: true

      # Step 5: Check for license compliance
      - name: License compliance check
        run: npx license-checker --onlyAllow '${{ env.APPROVED_LICENSES }}'
        continue-on-error: true

      # Step 6: Lint the codebase
      - name: Run linter
        run: npm run lint --if-present

      # Step 7: Run unit tests with coverage
      - name: Run tests
        run: npm test -- --ci --coverage --watchAll=false

      # Step 8: Build the application
      - name: Build application
        run: npm run build

      # Step 9: Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-node-${{ matrix.node-version }}
          path: ${{ env.BUILD_PATH }}
          retention-days: ${{ env.RETENTION_DAYS }}

      # Step 10: Upload test coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: ${{ env.COVERAGE_PATH }}
          retention-days: ${{ env.RETENTION_DAYS }}

      # Step 11: Job summary
      - name: Generate job summary
        if: always()
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Version | ${{ matrix.node-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner OS | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # Notification job
  notify:
    name: Send Notification
    runs-on: macos-latest
    needs: build-and-test
    if: always()

    steps:
      - name: Notify on success
        if: needs.build-and-test.result == 'success'
        run: echo "✅ Build and tests passed successfully!"

      - name: Notify on failure
        if: needs.build-and-test.result == 'failure'
        run: echo "❌ Build or tests failed! Check the logs."
