# =============================================================================
# MBB Mobile App - Android CD Workflow (React Native)
# =============================================================================
# This workflow deploys the Android RegionalApp to Google Play Store.
# It downloads the SAME release artifacts built by the Android CI pipeline
# and promotes them through 3 environments:
#
#   SIT (auto) → UAT (approval required) → Production (approval required)
#
# Trigger:
#   - Automatic: When Android CI succeeds on the main branch
#   - Manual: workflow_dispatch (re-deploy or ad-hoc)
#
# Build Once, Deploy Many:
#   All 3 environments use the SAME CI artifacts (matched by SHA).
#   No rebuilding occurs in CD.
#
# Approval Gates:
#   UAT and Production require approval via GitHub Environment Protection Rules.
#   Configure in: Settings → Environments → android-UAT / android-Production
#
# Required Secrets:
#   - GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  (Play Store API service account)
# =============================================================================

name: Android CD

on:
  # ---------------------------------------------------------------------------
  # Auto-trigger: When Android CI succeeds on main branch
  # ---------------------------------------------------------------------------
  workflow_run:
    workflows: ["Android CI - RegionalApp"]
    types: [completed]
    branches: [main]

  # ---------------------------------------------------------------------------
  # Manual trigger: Re-deploy or ad-hoc deployment
  # ---------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Demo mode - walk through pipeline with approval gates (no actual deployment)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      ci_run_id:
        description: 'CI workflow run ID to download artifacts from'
        required: true
        type: string
      app_version_name:
        description: 'App version name (e.g. 1.0.0) — must match the CI build'
        required: true
        type: string
        default: '1.0.0'
      app_version_code:
        description: 'App version code (e.g. 1) — must match the CI build'
        required: true
        type: string
        default: '1'
      commit_sha:
        description: 'Full commit SHA from the CI build — must match the CI artifact tag'
        required: true
        type: string
      release_notes:
        description: 'Release notes for this version'
        required: false
        type: string
        default: 'Bug fixes and performance improvements'

permissions:
  contents: write         # For creating GitHub Releases
  actions: read           # For downloading artifacts from CI runs

# ---------------------------------------------------------------------------
# Concurrency - only one CD pipeline at a time
# ---------------------------------------------------------------------------
concurrency:
  group: android-cd
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Pre-flight: Resolve CI build metadata
  # ===========================================================================
  resolve:
    name: Resolve CI Build Info
    runs-on: ubuntu-latest
    # Only proceed if triggered manually OR if the CI workflow succeeded
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      ci_run_id: ${{ steps.resolve.outputs.ci_run_id }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      app_version_name: ${{ steps.resolve.outputs.app_version_name }}
      app_version_code: ${{ steps.resolve.outputs.app_version_code }}
      release_notes: ${{ steps.resolve.outputs.release_notes }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}

    steps:
      # No checkout needed — this job only reads GitHub event context
      # and writes outputs. It never touches repository files.

      - name: Resolve build metadata
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # ---------------------------------------------------------------
            # Automatic trigger — read metadata from workflow_run event
            # github.event.inputs is EMPTY for workflow_run — never use it here
            # ---------------------------------------------------------------
            CI_RUN_ID="${{ github.event.workflow_run.id }}"
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"

            # Fetch artifact list from the CI run to extract version info
            # Version is embedded in artifact name: android-release-apk-vX.X.X(Y)-SHA
            ARTIFACT_NAME=$(gh api \
              /repos/${{ github.repository }}/actions/runs/${CI_RUN_ID}/artifacts \
              --jq '.artifacts[] | select(.name | startswith("android-release-apk")) | .name' \
              | head -1)

            echo "📦 Found artifact: $ARTIFACT_NAME"

            if [ -z "$ARTIFACT_NAME" ]; then
              echo "❌ No android-release-apk artifact found in CI run $CI_RUN_ID"
              exit 1
            fi

            # Extract version from artifact name pattern: vX.X.X(Y)-SHA
            APP_VERSION_NAME=$(echo "$ARTIFACT_NAME" | grep -oP '(?<=v)[0-9]+\.[0-9]+\.[0-9]+')
            APP_VERSION_CODE=$(echo "$ARTIFACT_NAME" | grep -oP '(?<=\()[0-9]+(?=\))')

            if [ -z "$APP_VERSION_NAME" ] || [ -z "$APP_VERSION_CODE" ]; then
              echo "❌ Could not extract version from artifact name: $ARTIFACT_NAME"
              exit 1
            fi

            echo "ci_run_id=${CI_RUN_ID}" >> $GITHUB_OUTPUT
            echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
            echo "app_version_name=${APP_VERSION_NAME}" >> $GITHUB_OUTPUT
            echo "app_version_code=${APP_VERSION_CODE}" >> $GITHUB_OUTPUT
            echo "release_notes=Automated deployment from CI build ${CI_RUN_ID}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT

          else
            # ---------------------------------------------------------------
            # Manual trigger — read from workflow_dispatch inputs
            # All values explicitly provided by the person triggering the run
            # ---------------------------------------------------------------
            if [ -z "${{ github.event.inputs.ci_run_id }}" ]; then
              echo "❌ ci_run_id is required for manual dispatch"
              exit 1
            fi
            if [ -z "${{ github.event.inputs.commit_sha }}" ]; then
              echo "❌ commit_sha is required for manual dispatch"
              exit 1
            fi

            echo "ci_run_id=${{ github.event.inputs.ci_run_id }}" >> $GITHUB_OUTPUT
            echo "commit_sha=${{ github.event.inputs.commit_sha }}" >> $GITHUB_OUTPUT
            echo "app_version_name=${{ github.event.inputs.app_version_name }}" >> $GITHUB_OUTPUT
            echo "app_version_code=${{ github.event.inputs.app_version_code }}" >> $GITHUB_OUTPUT
            echo "release_notes=${{ github.event.inputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          fi

          echo "📋 Resolved build info:"
          cat $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ===========================================================================
  # Stage 1: Deploy to SIT (automatic — no approval needed)
  # ===========================================================================
  deploy-sit:
    name: Deploy to SIT (Internal Testing)
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 30
    environment:
      name: android-SIT
      url: https://play.google.com/console/u/0/developers
    env:
      CI_RUN_ID: ${{ needs.resolve.outputs.ci_run_id }}
      COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
      APP_VERSION_NAME: ${{ needs.resolve.outputs.app_version_name }}
      APP_VERSION_CODE: ${{ needs.resolve.outputs.app_version_code }}
      DRY_RUN: ${{ needs.resolve.outputs.dry_run }}

    steps:
      - name: 🎬 Deployment Mode Indicator
        run: |
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "🎬 DEMO MODE ENABLED - SIT Stage"
            echo "## 🎬 Demo Mode - Stage 1: SIT" >> $GITHUB_STEP_SUMMARY
            echo "Showing demo deployment flow (no actual upload)" >> $GITHUB_STEP_SUMMARY
          else
            echo "🏢 PRODUCTION MODE - Actual SIT deployment"
          fi

      - name: Download APK artifact from CI
        if: env.DRY_RUN != 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ env.COMMIT_SHA }}
          path: artifacts/apk
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        if: env.DRY_RUN != 'true'
        run: |
          echo "📦 Downloaded artifacts for SIT:"
          find artifacts -type f -name "*.apk" | while read f; do
            echo "  - $f ($(du -h "$f" | cut -f1))"
          done

      - name: Verify downloaded artifacts
        if: env.DRY_RUN != 'true'
        run: |
          APK_COUNT=$(find artifacts/apk -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "❌ No APK files found — download may have failed"
            exit 1
          fi
          echo "✅ Found $APK_COUNT APK file(s)"

      - name: 📋 Demo Validation (Dry Run)
        if: env.DRY_RUN == 'true'
        run: |
          echo "## ✅ Pre-Deployment Checks (Demo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Verified build artifacts exist" >> $GITHUB_STEP_SUMMARY
          echo "✅ Validated app signing profile" >> $GITHUB_STEP_SUMMARY
          echo "✅ Confirmed SIT environment readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ready to proceed to UAT approval gate" >> $GITHUB_STEP_SUMMARY

      - name: Create service account key
        if: env.DRY_RUN != 'true'
        run: |
          echo "::add-mask::${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}"
          SERVICE_ACCOUNT_PATH=$RUNNER_TEMP/service-account.json
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > "$SERVICE_ACCOUNT_PATH"
          echo "SERVICE_ACCOUNT_PATH=$SERVICE_ACCOUNT_PATH" >> $GITHUB_ENV
          echo "✅ Service account key written to RUNNER_TEMP"

      - name: Prepare release notes
        if: env.DRY_RUN != 'true'
        run: |
          mkdir -p whatsnew
          NOTES="${{ needs.resolve.outputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements"
          fi
          echo "$NOTES" > whatsnew/whatsnew-en-US
          echo "✅ Release notes written"

      - name: Upload APK to Google Play (Internal Testing)
        if: env.DRY_RUN != 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.SERVICE_ACCOUNT_PATH }}
          packageName: com.mbb.regionalapp
          releaseFiles: artifacts/apk/*.apk
          track: internal
          whatsNewDirectory: whatsnew
          status: completed

      - name: SIT deployment summary
        if: always()
        run: |
          echo "## 🚀 Android SIT Stage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "| **Mode** | 🎬 Demo (Dry Run) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Mode** | 🏢 Production |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Environment** | SIT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Track** | Internal Testing |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ env.COMMIT_SHA }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **CI Run** | ${{ env.CI_RUN_ID }} |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          rm -f "${{ env.SERVICE_ACCOUNT_PATH }}"
          echo "✅ Cleanup complete"

  # ===========================================================================
  # Stage 2: Deploy to UAT (requires approval) — only in dry_run mode
  # ===========================================================================
  deploy-uat:
    name: Deploy to UAT (Closed Testing)
    runs-on: ubuntu-latest
    needs: [resolve, deploy-sit]
    timeout-minutes: 30
    environment:
      name: android-UAT
      url: https://play.google.com/console/u/0/developers
    env:
      CI_RUN_ID: ${{ needs.resolve.outputs.ci_run_id }}
      COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
      APP_VERSION_NAME: ${{ needs.resolve.outputs.app_version_name }}
      APP_VERSION_CODE: ${{ needs.resolve.outputs.app_version_code }}
      DRY_RUN: ${{ needs.resolve.outputs.dry_run }}

    steps:
      - name: 🎬 Deployment Mode Indicator
        run: |
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "🎬 DEMO MODE ENABLED - UAT Stage"
            echo "## 🎬 Demo Mode - Stage 2: UAT" >> $GITHUB_STEP_SUMMARY
            echo "Showing demo deployment flow (no actual upload)" >> $GITHUB_STEP_SUMMARY
          else
            echo "🏢 PRODUCTION MODE - Actual UAT deployment"
          fi

      - name: Download APK artifact from CI
        if: env.DRY_RUN != 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ env.COMMIT_SHA }}
          path: artifacts/apk
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        if: env.DRY_RUN != 'true'
        run: |
          echo "📦 Downloaded artifacts for UAT:"
          find artifacts -type f -name "*.apk" | while read f; do
            echo "  - $f ($(du -h "$f" | cut -f1))"
          done

      - name: Verify downloaded artifacts
        if: env.DRY_RUN != 'true'
        run: |
          APK_COUNT=$(find artifacts/apk -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "❌ No APK files found — download may have failed"
            exit 1
          fi
          echo "✅ Found $APK_COUNT APK file(s)"

      - name: 📋 Demo Validation (Dry Run)
        if: env.DRY_RUN == 'true'
        run: |
          echo "## ✅ Pre-Deployment Checks (Demo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Verified build artifacts exist" >> $GITHUB_STEP_SUMMARY
          echo "✅ Validated app signing profile" >> $GITHUB_STEP_SUMMARY
          echo "✅ Confirmed UAT environment readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ready to proceed to Production approval gate" >> $GITHUB_STEP_SUMMARY

      - name: Create service account key
        if: env.DRY_RUN != 'true'
        run: |
          echo "::add-mask::${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}"
          SERVICE_ACCOUNT_PATH=$RUNNER_TEMP/service-account.json
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > "$SERVICE_ACCOUNT_PATH"
          echo "SERVICE_ACCOUNT_PATH=$SERVICE_ACCOUNT_PATH" >> $GITHUB_ENV
          echo "✅ Service account key written to RUNNER_TEMP"

      - name: Prepare release notes
        if: env.DRY_RUN != 'true'
        run: |
          mkdir -p whatsnew
          NOTES="${{ needs.resolve.outputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements"
          fi
          echo "$NOTES" > whatsnew/whatsnew-en-US
          echo "✅ Release notes written"

      - name: Upload APK to Google Play (Alpha / Closed Testing)
        if: env.DRY_RUN != 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.SERVICE_ACCOUNT_PATH }}
          packageName: com.mbb.regionalapp
          releaseFiles: artifacts/apk/*.apk
          track: alpha
          whatsNewDirectory: whatsnew
          status: completed

      - name: UAT deployment summary
        if: always()
        run: |
          echo "## 🚀 Android UAT Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "| **Mode** | 🎬 Demo (Dry Run) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Mode** | 🏢 Production |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Environment** | UAT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Track** | Alpha (Closed Testing) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ env.COMMIT_SHA }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **CI Run** | ${{ env.CI_RUN_ID }} |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          rm -f "${{ env.SERVICE_ACCOUNT_PATH }}"
          echo "✅ Cleanup complete"

  # ===========================================================================
  # Stage 3: Deploy to Production (requires approval)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [resolve, deploy-uat]
    timeout-minutes: 30
    environment:
      name: android-Production
      url: https://play.google.com/console/u/0/developers
    env:
      CI_RUN_ID: ${{ needs.resolve.outputs.ci_run_id }}
      COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
      APP_VERSION_NAME: ${{ needs.resolve.outputs.app_version_name }}
      APP_VERSION_CODE: ${{ needs.resolve.outputs.app_version_code }}
      DRY_RUN: ${{ needs.resolve.outputs.dry_run }}

    steps:
      - name: 🎬 Deployment Mode Indicator
        run: |
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "🎬 DEMO MODE ENABLED - Production Stage"
            echo "## 🎬 Demo Mode - Stage 3: Production" >> $GITHUB_STEP_SUMMARY
            echo "Showing demo deployment flow (no actual upload)" >> $GITHUB_STEP_SUMMARY
          else
            echo "🏢 PRODUCTION MODE - Actual Production deployment"
          fi

      - name: Download AAB artifact from CI
        if: env.DRY_RUN != 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ env.COMMIT_SHA }}
          path: artifacts/aab
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK artifact from CI
        if: env.DRY_RUN != 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ env.COMMIT_SHA }}
          path: artifacts/apk
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        if: env.DRY_RUN != 'true'
        run: |
          echo "📦 Downloaded artifacts for Production:"
          find artifacts -type f \( -name "*.aab" -o -name "*.apk" \) | while read f; do
            echo "  - $f ($(du -h "$f" | cut -f1))"
          done

      - name: Verify downloaded artifacts
        if: env.DRY_RUN != 'true'
        run: |
          AAB_COUNT=$(find artifacts/aab -name "*.aab" 2>/dev/null | wc -l)
          APK_COUNT=$(find artifacts/apk -name "*.apk" 2>/dev/null | wc -l)

          if [ "$AAB_COUNT" -eq 0 ]; then
            echo "❌ No AAB files found — download may have failed"
            exit 1
          fi
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "❌ No APK files found — download may have failed"
            exit 1
          fi
          echo "✅ Found $AAB_COUNT AAB file(s) and $APK_COUNT APK file(s)"

      - name: 📋 Demo Validation (Dry Run)
        if: env.DRY_RUN == 'true'
        run: |
          echo "## ✅ Pre-Deployment Checks (Demo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Verified build artifacts exist" >> $GITHUB_STEP_SUMMARY
          echo "✅ Validated app signing profile" >> $GITHUB_STEP_SUMMARY
          echo "✅ Confirmed Production environment readiness" >> $GITHUB_STEP_SUMMARY

      - name: Create service account key
        if: env.DRY_RUN != 'true'
        run: |
          echo "::add-mask::${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}"
          SERVICE_ACCOUNT_PATH=$RUNNER_TEMP/service-account.json
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > "$SERVICE_ACCOUNT_PATH"
          echo "SERVICE_ACCOUNT_PATH=$SERVICE_ACCOUNT_PATH" >> $GITHUB_ENV
          echo "✅ Service account key written to RUNNER_TEMP"

      - name: Prepare release notes
        if: env.DRY_RUN != 'true'
        run: |
          mkdir -p whatsnew
          NOTES="${{ needs.resolve.outputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements"
          fi
          echo "$NOTES" > whatsnew/whatsnew-en-US
          echo "✅ Release notes written"

      - name: Upload AAB to Google Play (Production)
        if: env.DRY_RUN != 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.SERVICE_ACCOUNT_PATH }}
          packageName: com.mbb.regionalapp
          releaseFiles: artifacts/aab/*.aab
          track: production
          whatsNewDirectory: whatsnew
          status: completed

      - name: Create GitHub Release
        if: env.DRY_RUN != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ env.APP_VERSION_NAME }}-${{ env.APP_VERSION_CODE }}
          name: "Android v${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }})"
          body: |
            ## Android Release v${{ env.APP_VERSION_NAME }}

            **Build:** ${{ env.APP_VERSION_CODE }}
            **Commit:** ${{ env.COMMIT_SHA }}

            ### Promotion Path
            SIT ✅ → UAT ✅ → Production ✅

            ### Release Notes
            ${{ needs.resolve.outputs.release_notes }}
          files: |
            artifacts/aab/*.aab
            artifacts/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Production deployment summary
        if: always()
        run: |
          echo "## 🚀 Android Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.DRY_RUN }}" == "true" ]; then
            echo "| **Mode** | 🎬 Demo (Dry Run) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Mode** | 🏢 Production |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Environment** | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| **Track** | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ env.COMMIT_SHA }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **CI Run** | ${{ env.CI_RUN_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitHub Release** | android-v${{ env.APP_VERSION_NAME }}-${{ env.APP_VERSION_CODE }} |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          rm -f "${{ env.SERVICE_ACCOUNT_PATH }}"
          echo "✅ Cleanup complete"
