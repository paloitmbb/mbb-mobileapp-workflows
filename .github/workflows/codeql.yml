# =============================================================================
# CodeQL Analysis — {{REPO_NAME}} (React Native)
# =============================================================================
# SAST via GitHub CodeQL — runs on every PR, every push to main/sit,
# and on a weekly schedule. Results surface in:
#   GitHub → Security → Code scanning
#
# Language: javascript-typescript  (covers .js, .mjs, .cjs, .ts, .tsx, .jsx)
# Coverage: security-extended queries  →  OWASP Top 10 + CWE beyond defaults
#           security-and-quality queries  →  maintainability + reliability
#
# Note: JavaScript/TypeScript are interpreted — no build step is required.
#       CodeQL analyses the source directly.
# =============================================================================
name: CodeQL Analysis

on:
  pull_request:
    branches: [main, sit]
  push:
    branches: [main, sit]
  schedule:
    # Randomised offset avoids peak load on GitHub's SARIF ingestion service.
    - cron: "43 6 * * 1" # Weekly — Monday 06:43 UTC
  workflow_dispatch:

permissions:
  contents: read          # Allows workflow to clone repository
  pull-requests: write    # Post Dependency Review comments
  security-events: write  # Upload CodeQL scan results
  actions: read           # Required by CodeQL on private repos

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — CodeQL SAST
  # ---------------------------------------------------------------------------
  analyze:
    name: Analyze (${{ matrix.language }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false # keep analyzing remaining languages if one fails
      matrix:
        language:
          - javascript-typescript
          - java-kotlin 

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Initialize CodeQL database and inject security query suites.
      # No explicit build step needed for JavaScript / TypeScript —
      # CodeQL performs its own extraction pass over the source files.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.32.5
        with:
          languages: ${{ matrix.language }}
          # security-extended — XSS, injection, prototype pollution, SSRF,
          #                     path traversal, insecure randomness, and more.
          # security-and-quality — adds code health: dead code, unused vars.
          queries: security-extended,security-and-quality

      # -----------------------------------------------------------------------
      # Build step required for java-kotlin language only
      # JS/TS skips this automatically (CodeQL detects no build needed)
      # -----------------------------------------------------------------------
      - name: Setup Java (for java-kotlin analysis)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4@3a4f6e1234567890abcdef...    # v4@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js (React Native JS bundle needed for Android build)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        if: matrix.language == 'java-kotlin'
        run: npm ci

      - name: Build Android for CodeQL
        if: matrix.language == 'java-kotlin'
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug \
            --no-daemon \
            -x lint \
            -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.32.5
        with:
          category: "/language:${{ matrix.language }}"
          # Emit SARIF locally so the artifact step below can capture it.
          output: sarif-results
          upload: true

      # Archive SARIF for local debugging without visiting the Security tab.
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2 — Dependency Review  (pull_request events only)
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write    # Post Dependency Review comments
      contents: read           # Allows workflow to clone repository
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4
        with:
          # Block PRs that introduce HIGH or CRITICAL CVEs.
          fail-on-severity: high
          # Always post a summary table to the PR for visibility.
          comment-summary-in-pr: always
          warn-only: false
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1, LGPL-3.0

