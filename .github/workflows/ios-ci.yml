# =============================================================================
# MBB Mobile App - iOS CI Workflow (React Native)
# =============================================================================
# This workflow builds the iOS RegionalApp using React Native.
# It runs on macOS (required for Xcode/xcodebuild).
# Trigger: workflow_dispatch (manual) with environment selection.
#
# Job Flow:
#   Job 1: Install  →  Job 2: Scan           ──→  Job 4: Build iOS
#                   →  Job 3: Test           ──┘
#
# Note: CodeQL runs independently via codeql.yml
#       Secret scanning is handled by GitHub's native secret scanning
# =============================================================================

name: iOS CI - RegionalApp

on:
  pull_request:
    branches: [main, sit]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - SIT
          - Staging
          - Production
        default: 'SIT'

permissions:
  contents: read          # Allows workflow to clone repository

# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  NODE_VERSION: '20'
  RUBY_VERSION: '3.2'
  XCODE_WORKSPACE: 'ios/RegionalApp.xcworkspace'
  XCODE_PROJECT: 'ios/RegionalApp.xcodeproj'
  ENVIRONMENT: ${{ github.event.inputs.environment || 'SIT' }}

# ---------------------------------------------------------------------------
# Concurrency - cancel in-progress runs for the same branch/environment
# ---------------------------------------------------------------------------
concurrency:
  group: ios-ci-${{ github.ref }}-${{ github.event.inputs.environment || 'SIT' }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Install - Setup environment and install dependencies
  # ===========================================================================
  install:
    name: Install Dependencies
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-latest
    timeout-minutes: 15
    outputs:
      APP_VERSION_NAME: ${{ steps.app_version.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ steps.app_version.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # -----------------------------------------------------------------------
      # Step 3: Install npm dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm install

      # -----------------------------------------------------------------------
      # Step 4: Cache node_modules for downstream jobs
      # -----------------------------------------------------------------------
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 5: Check app version
      # -----------------------------------------------------------------------
      - name: Check app version
        id: app_version
        run: |
          # Extract version from package.json
          APP_VERSION_NAME=$(node -p "require('./package.json').version")

          # Extract iOS build number from Xcode project
          APP_VERSION_CODE=$(grep -A1 'CURRENT_PROJECT_VERSION' ${{ env.XCODE_PROJECT }}/project.pbxproj | head -2 | grep -o '[0-9]*' | head -1)

          # Fallback if not found
          APP_VERSION_CODE=${APP_VERSION_CODE:-1}

          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "APP_VERSION_CODE=$APP_VERSION_CODE" >> $GITHUB_OUTPUT

          echo "📱 App Version: $APP_VERSION_NAME ($APP_VERSION_CODE)"

  # ===========================================================================
  # Job 2: Scan - Security audit and Lint
  # ===========================================================================
  scan:
    name: Security Audit & Lint
    runs-on: macos-latest
    needs: install
    timeout-minutes: 10

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # Step 3: Restore node_modules cache
      # -----------------------------------------------------------------------
      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4: Security audit
      # -----------------------------------------------------------------------
      - name: Security audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Step 5: Lint (ESLint)
      # -----------------------------------------------------------------------
      - name: Lint
        run: npm run lint

  # ===========================================================================
  # Job 3: Test - Unit tests
  # ===========================================================================
  test:
    name: Unit Tests
    runs-on: macos-latest
    needs: install
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # Step 3: Restore node_modules cache
      # -----------------------------------------------------------------------
      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4: Run unit tests
      # -----------------------------------------------------------------------
      - name: Run unit tests
        run: npm test

  # ===========================================================================
  # Job 4: Build iOS - Build, sign, and upload artifacts
  # ===========================================================================
  build:
    name: Build iOS (${{ env.ENVIRONMENT }})
    runs-on: macos-latest
    needs: [install, scan, test]
    timeout-minutes: 60
    env:
      APP_VERSION_NAME: ${{ needs.install.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ needs.install.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # Step 3: Restore node_modules cache
      # -----------------------------------------------------------------------
      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4: Setup Ruby (for CocoaPods)
      # -----------------------------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      # -----------------------------------------------------------------------
      # Step 5: Install CocoaPods
      # -----------------------------------------------------------------------
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install

      # -----------------------------------------------------------------------
      # Step 6: Install iOS certificate (Staging/Production only)
      # -----------------------------------------------------------------------
      - name: Install iOS certificate
        if: env.ENVIRONMENT != 'SIT'
        run: |
          # Decode certificate from base64
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12

          echo "✅ iOS certificate decoded successfully"

      # -----------------------------------------------------------------------
      # Step 7: Install provisioning profile (Staging/Production only)
      # -----------------------------------------------------------------------
      - name: Install provisioning profile
        if: env.ENVIRONMENT != 'SIT'
        run: |
          # Decode provisioning profile from base64
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          echo "✅ Provisioning profile installed"

      # -----------------------------------------------------------------------
      # Step 8: Create temporary Xcode keychain (Staging/Production only)
      # -----------------------------------------------------------------------
      - name: Create Xcode keychain
        if: env.ENVIRONMENT != 'SIT'
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH

          # Import certificate into keychain
          security import certificate.p12 -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "✅ Keychain created and certificate imported"

      # -----------------------------------------------------------------------
      # Step 9: Build iOS app
      # -----------------------------------------------------------------------
      - name: Build iOS app (${{ env.ENVIRONMENT }})
        run: |
          ENV="${{ env.ENVIRONMENT }}"

          if [ "$ENV" = "SIT" ]; then
            npm run build:ios:debug:sit:development || \
            xcodebuild build \
              -workspace ${{ env.XCODE_WORKSPACE }} \
              -scheme RegionalApp-Dev \
              -configuration Debug \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO

          elif [ "$ENV" = "Staging" ]; then
            npm run build:ios:release:staging:adhoc || \
            xcodebuild archive \
              -workspace ${{ env.XCODE_WORKSPACE }} \
              -scheme RegionalApp-Staging \
              -configuration Release \
              -archivePath ios/build/RegionalApp-${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }}).xcarchive \
              CODE_SIGNING_ALLOWED=YES

          elif [ "$ENV" = "Production" ]; then
            npm run build:ios:release:staging:appstore || \
            xcodebuild archive \
              -workspace ${{ env.XCODE_WORKSPACE }} \
              -scheme RegionalApp \
              -configuration Release \
              -archivePath ios/build/RegionalApp-${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }}).xcarchive \
              CODE_SIGNING_ALLOWED=YES
          fi

      # -----------------------------------------------------------------------
      # Step 10: Zip .xcarchive file
      # -----------------------------------------------------------------------
      - name: Zip XCArchive file
        if: env.ENVIRONMENT != 'SIT'
        run: |
          cd ios/build
          ARCHIVE_NAME="RegionalApp-${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }}).xcarchive"
          zip -r "${ARCHIVE_NAME}.zip" "$ARCHIVE_NAME"
          echo "✅ Zipped: ${ARCHIVE_NAME}.zip"

      # -----------------------------------------------------------------------
      # Step 11: Upload .xcarchive artifact
      # -----------------------------------------------------------------------
      - name: Upload iOS XCArchive artifact
        if: env.ENVIRONMENT != 'SIT'
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ env.ENVIRONMENT }}-xcarchive-${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})
          path: ios/build/RegionalApp-${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }}).xcarchive.zip
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Step 12: Upload .ipa artifact
      # -----------------------------------------------------------------------
      - name: Upload iOS IPA artifact
        if: env.ENVIRONMENT != 'SIT'
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ env.ENVIRONMENT }}-ipa-${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})
          path: ios/build/ipa/RegionalApp-*.ipa
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Step 13: Job summary
      # -----------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          echo "## 📱 iOS CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | RegionalApp (iOS) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ env.ENVIRONMENT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Node.js** | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Cleanup: Remove keychain and certificate
      # -----------------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f certificate.p12
