        run: |
          echo "## 📱 iOS CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | RegionalApp (iOS) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ env.APP_VERSION_NAME }} (${{ env.APP_VERSION_CODE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | ${{ runner.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Node.js** | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Cleanup — unconditional, runs on success, failure AND cancellation
      # rm -f silently no-ops if files don't exist — safe to always run
      # -----------------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          # Remove DerivedData from debug build
          rm -rf "$RUNNER_TEMP/DerivedData"
