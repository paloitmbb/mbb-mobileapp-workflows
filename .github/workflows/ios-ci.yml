      # -----------------------------------------------------------------------
      # Step 11: Upload debug build artifact (simulator app)
      # -----------------------------------------------------------------------
      - name: Upload iOS Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app-v${{ env.APP_VERSION_NAME }}(${{ env.APP_VERSION_CODE }})-${{ github.sha }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: warn
          retention-days: 7

