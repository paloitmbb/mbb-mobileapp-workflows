      #     # Import certificate from RUNNER_TEMP (not project directory)
      #     security import "${{ env.CERTIFICATE_PATH }}" \
      #       -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
      #       -A -t cert -f pkcs12 \
      #       -k "$KEYCHAIN_PATH"
      #
      #     security set-key-partition-list \
      #       -S apple-tool:,apple: \
      #       -k "${{ secrets.KEYCHAIN_PASSWORD }}" \
      #       "$KEYCHAIN_PATH"
