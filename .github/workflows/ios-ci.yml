# =============================================================================
# MBB Mobile App - iOS CI Workflow (React Native)
# =============================================================================
# This workflow builds the iOS RegionalApp using React Native.
# It runs on macOS (required for Xcode/xcodebuild).
# Trigger: workflow_dispatch (manual) with environment selection.
#
# Job Flow:
#   Job 1: install
#       ↓
#   Jobs 2a-2e (parallel):
#     2a: lint-js | 2b: lint-ios | 2c: test-js | 2d: test-ios | 2e: security-scan
#       ↓
#   Job 3: build (gated on 2a-2d; 2e is non-blocking)
#
# Note: CodeQL runs independently via codeql.yml
#       Secret scanning is handled by GitHub's native secret scanning
# =============================================================================

name: iOS CI - RegionalApp

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'package*.json'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'package*.json'
  workflow_dispatch:

permissions:
  contents: read          # Allows workflow to clone repository
  security-events: write  # Allows uploading Trivy SARIF results
  actions: read          # Allows using actions/checkout and other actions  
  checks: write          # Allows creating commit status checks (if needed)
  pull-requests: write   # Allows commenting on PRs (if needed)
# ---------------------------------------------------------------------------
# Environment variables
# ---------------------------------------------------------------------------
env:
  NODE_VERSION: '20'
  RUBY_VERSION: '3.2'
  XCODE_WORKSPACE: 'ios/RegionalApp.xcworkspace'
  XCODE_PROJECT: 'ios/RegionalApp.xcodeproj'
  XCODE_SCHEME: 'RegionalApp'

# ---------------------------------------------------------------------------
# Concurrency - cancel in-progress runs for the same branch/environment
# ---------------------------------------------------------------------------
concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Install — installs dependencies, saves caches, extracts app version
  # ===========================================================================
  install:
    name: Install dependencies and check app version
    runs-on: macos-latest
    timeout-minutes: 30
    outputs:
      APP_VERSION_NAME: ${{ steps.app_version.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ steps.app_version.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # -----------------------------------------------------------------------
      # Step 3: Install npm dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Step 4a: Save node_modules cache for macOS jobs
      # (install runs on macOS — this cache serves lint-ios, test-ios, build)
      # -----------------------------------------------------------------------
      - name: Save node_modules cache (macOS)
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-macOS-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4b: Save node_modules cache for Linux jobs
      # (lint-js, test-js run on ubuntu — need a Linux-keyed cache)
      # -----------------------------------------------------------------------
      - name: Save node_modules cache (Linux)
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-Linux-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 5: Check app version
      # -----------------------------------------------------------------------
      - name: Check app version
        id: app_version
        run: |
          # Extract version from package.json
          APP_VERSION_NAME=$(node -p "require('./package.json').version")

          # Extract iOS build number from Xcode project
          APP_VERSION_CODE=$(grep -A1 'CURRENT_PROJECT_VERSION' ${{ env.XCODE_PROJECT }}/project.pbxproj | head -2 | grep -o '[0-9]*' | head -1)

          # Fallback if not found
          APP_VERSION_CODE=${APP_VERSION_CODE:-1}

          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "APP_VERSION_CODE=$APP_VERSION_CODE" >> $GITHUB_OUTPUT

          echo "📱 App Version: $APP_VERSION_NAME ($APP_VERSION_CODE)"

 
  # ============================================================
  # Job 2a: JS Lint (runs in parallel with 2b, 2c, 2d)
  # ============================================================
  lint-js:
    name: JS Lint (ESLint)
    runs-on: ubuntu-latest
    needs: install          # ← waits for install, then runs in parallel
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-Linux-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint

  # ============================================================
  # Job 2b: iOS Lint (xcodebuild analyze)
  # ============================================================
  lint-ios:
    name: iOS Static Analysis (xcodebuild)
    runs-on: macos-latest        # ← must be macOS for Xcode
    needs: install
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-macOS-${{ hashFiles('package-lock.json') }}

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-macOS-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-macOS-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Run Xcode static analysis
        run: |
          xcodebuild analyze \
            -workspace ${{ env.XCODE_WORKSPACE }} \
            -scheme ${{ env.XCODE_SCHEME }} \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -parallelizeTargets \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
  #------------------------------------------------------------------------------
  # Job 2c: JS Unit Tests (runs in parallel with 2a, 2b, 2d)
  #------------------------------------------------------------------------------
  test-js:
    name: JS Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-Linux-${{ hashFiles('package-lock.json') }}

      - name: Run Jest tests
        run: npm test -- --ci --coverage
        # No continue-on-error — failure blocks the build

      - name: Upload Jest coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ============================================================
  # Job 2d: iOS Unit Tests
  # ============================================================
  test-ios:
    name: iOS Unit Tests (xcodebuild)
    runs-on: macos-latest        # ← must be macOS for Xcode
    needs: install
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-macOS-${{ hashFiles('package-lock.json') }}

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-macOS-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-macOS-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Run iOS unit tests
        run: |
          xcodebuild test \
            -workspace ${{ env.XCODE_WORKSPACE }} \
            -scheme ${{ env.XCODE_SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            -parallelizeTargets \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath $RUNNER_TEMP/TestResults.xcresult

      - name: Upload iOS test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results-${{ github.sha }}
          path: ${{ runner.temp }}/TestResults.xcresult
          retention-days: 7

  # ============================================================
  # Job 2e: Security Scan (non-blocking)
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: install               # ← only needs install, not all quality jobs
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-Linux-${{ hashFiles('package-lock.json') }}

      - name: npm audit
        run: npm audit --audit-level=moderate || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.32.5
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-ios'
          
  # ===========================================================================
  # Job 3: Build iOS - Build, sign, and upload artifacts
  # ===========================================================================
  build:
    name: Build iOS (Debug)
    runs-on: macos-latest
    needs: [install, lint-js, lint-ios, test-ios, test-js]  # ← waits for all quality gate jobs
    timeout-minutes: 60
    env:
      APP_VERSION_NAME: ${{ needs.install.outputs.APP_VERSION_NAME }}
      APP_VERSION_CODE: ${{ needs.install.outputs.APP_VERSION_CODE }}

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -----------------------------------------------------------------------
      # Step 3: Restore node_modules cache
      # -----------------------------------------------------------------------
      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-macOS-${{ hashFiles('package-lock.json') }}

      # -----------------------------------------------------------------------
      # Step 4: Setup Ruby (for CocoaPods)
      # -----------------------------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      # -----------------------------------------------------------------------
      # Step 5: Cache CocoaPods
      # -----------------------------------------------------------------------
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-macOS-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-macOS-


      # -----------------------------------------------------------------------
      # Step 6: Install CocoaPods
      # -----------------------------------------------------------------------
      - name: Install CocoaPods
        run: |
          cd ios && pod install

      # -----------------------------------------------------------------------
      # Step 7: [COMMENTED - Uncomment when secrets are configured]
      # Setup iOS certificate — decoded to RUNNER_TEMP (never project dir)
