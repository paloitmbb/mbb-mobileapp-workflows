# =============================================================================
# Dependabot Configuration — MBB Mobile App (React Native)
# =============================================================================
# Security-only mode: Dependabot will NOT open version update PRs.
# It will still create PRs for known security vulnerabilities (CVEs).
# Covers: npm, GitHub Actions, Gradle (Android).
# =============================================================================

version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm (JavaScript / TypeScript dependencies) — security alerts only
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # ---------------------------------------------------------------------------
  # GitHub Actions (workflow action versions) — security alerts only
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # ---------------------------------------------------------------------------
  # Gradle (Android dependencies) — security alerts only
  # ---------------------------------------------------------------------------
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"
