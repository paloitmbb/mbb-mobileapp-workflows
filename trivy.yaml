# ──────────────────────────────────────────────────────────────
# Trivy Scanner Configuration
# https://aquasecurity.github.io/trivy/latest/docs/references/configuration/config-file/
# ──────────────────────────────────────────────────────────────

# Severity levels to report
severity:
  - CRITICAL
  - HIGH

# Exit with code 1 when vulnerabilities are found (used in CI)
exit-code: 1

# Skip vulnerabilities with no available fix
ignore-unfixed: true

# Scanners to enable
scanners:
  - vuln
  - secret
  - misconfig

# Vulnerability scanner options
vulnerability:
  type:
    - os
    - library

# Secret scanner options
secret:
  config: ""

# Misconfiguration scanner options
misconfiguration:
  # Scan GitHub Actions workflow files
  include:
    - ".github/**"

# Directories to skip during scanning
skip-dirs:
  - node_modules/.cache
  - .git
  - coverage
  - android/.gradle
  - ios/Pods

# Files to skip
skip-files: []

# Output format (override via CLI in CI: --format sarif)
format: table

# Cache settings
cache:
  dir: /tmp/trivy-cache

# Database settings
db:
  skip-update: false
